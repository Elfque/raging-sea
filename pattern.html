<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Interactive Shader Pulse | Three.js + Mouse-Reactive Colors</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", "Poppins", "Arial", sans-serif;
      }

      #info {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.65);
        padding: 10px 20px;
        border-radius: 40px;
        backdrop-filter: blur(8px);
        pointer-events: none;
        z-index: 10;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        font-family: monospace;
        border-left: 3px solid #ff66cc;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      #instruction {
        position: absolute;
        bottom: 20px;
        right: 20px;
        color: rgba(255, 255, 255, 0.8);
        background: rgba(0, 0, 0, 0.5);
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-family: monospace;
        backdrop-filter: blur(4px);
        pointer-events: none;
        z-index: 10;
      }

      @media (max-width: 600px) {
        #info {
          font-size: 10px;
          bottom: 12px;
          left: 12px;
        }
        #instruction {
          font-size: 9px;
        }
      }
    </style>
  </head>
  <body>
    <div id="info">
      🎨 SHADER PULSE |
      <span style="color: #ffaa88">COLOR REACTS TO MOUSE</span> | THREE.JS
    </div>
    <div id="instruction">🖱️ MOVE CURSOR → HUE & INTENSITY SHIFT</div>

    <!-- <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script> -->

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      // --- Setup Scene, Camera, Renderer ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020214); // deep cosmic background
      scene.fog = new THREE.FogExp2(0x020214, 0.006);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(2.2, 1.5, 3.8);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.toneMapping = THREE.ReinhardToneMapping;
      renderer.toneMappingExposure = 1.3;
      document.body.appendChild(renderer.domElement);

      // --- Post Processing: Bloom for glowing shader effect ---
      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.1,
        0.4,
        0.85,
      );
      bloomPass.threshold = 0.05;
      bloomPass.strength = 0.95;
      bloomPass.radius = 0.7;
      const effectComposer = new EffectComposer(renderer);
      effectComposer.addPass(renderScene);
      effectComposer.addPass(bloomPass);

      // --- Orbit Controls (auto-rotate off for better interaction, but user can drag) ---
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.autoRotate = false;
      controls.enableZoom = true;
      controls.zoomSpeed = 1.0;
      controls.enablePan = false;
      controls.target.set(0, 0, 0);

      // --- Mouse tracking uniforms (to send to shader) ---
      // We'll use normalized mouse coordinates: range -1 to 1 (x: left->right, y: bottom->top)
      // Also track mouse influence intensity for smoothness
      const mouseUniform = {
        value: new THREE.Vector2(0, 0),
      };
      const mouseIntensityUniform = {
        value: 0.0,
      };

      // Smooth mouse tracking for elegant transitions
      let targetMouse = new THREE.Vector2(0, 0);
      let currentMouse = new THREE.Vector2(0, 0);

      window.addEventListener("mousemove", (event) => {
        // Normalize: x: -1 to 1 (left to right), y: -1 to 1 (bottom to top, but in GL y is flipped? we'll keep consistent)
        // For shader artistic effect, we want 0..1 range maybe, but mapping to -1..1 gives directional hue shifts.
        // Let's map to [-1, 1] range for both X and Y to get full spectrum influence.
        const nx = (event.clientX / window.innerWidth) * 2 - 1;
        const ny = (event.clientY / window.innerHeight) * 2 - 1;
        targetMouse.set(nx, ny);
        // Also update intensity based on movement? but we'll use raw position directly.
      });

      // Also track mouse leave? not necessary, but we add a subtle reset when out of window? keep last known.

      // --- Create a high-res sphere with custom ShaderMaterial ---
      // Vertex Shader: passes UV, normals, and position, also passes mouse uniforms for wave effect
      // Fragment Shader: dynamic color based on mouse position + pulsing time + view angle

      const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform float uTime;
            
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal); // transformed normal for lighting hint
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

      const fragmentShader = `
            uniform float uTime;
            uniform vec2 uMouse;
            uniform float uGlowIntensity;
            
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            
            // Helper: convert HSV to RGB (for rich color cycling based on mouse)
            vec3 hsv2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }
            
            void main() {
                // 1. PULSE FACTOR: a breathing sine wave that creates rhythmic intensity
                float pulseRaw = sin(uTime * 1.8);
                float pulseFactor = 0.55 + (pulseRaw * 0.45);  // ranges 0.1 to 1.0 -> makes it vibrant
                
                // 2. MOUSE INFLUENCE: map mouse coordinates (-1..1) to hue offset and saturation shift
                // Normalized mouse values (x: red-blue shift, y: green-purple shift)
                float mouseX = clamp(uMouse.x, -0.99, 0.99);
                float mouseY = clamp(uMouse.y, -0.99, 0.99);
                
                // Create dynamic hue: base hue cycles with time, but mouse X adds a strong offset
                float timeHue = fract(uTime * 0.12);
                float mouseHueOffset = mouseX * 0.8;          // range -0.8 to 0.8
                float hue = fract(timeHue + mouseHueOffset + 0.5);
                
                // Saturation: influenced by mouse Y and pulse, making colors richer when mouse moves vertically
                float saturation = 0.7 + (mouseY * 0.3) + (pulseFactor * 0.2);
                saturation = clamp(saturation, 0.5, 1.0);
                
                // Value (brightness): pulsing with a rim-light effect based on normals
                float valueBase = 0.8 + pulseFactor * 0.5;
                // Add rim lighting effect: dot product between normal and view direction for extra pop
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                float rim = 1.0 - abs(dot(normal, viewDir));
                rim = pow(rim, 1.5) * (0.6 + mouseY * 0.5);
                
                float finalValue = valueBase + rim * 0.6;
                finalValue = clamp(finalValue, 0.6, 1.4);
                
                // Base color from HSV
                vec3 hsvColor = vec3(hue, saturation, finalValue);
                vec3 color = hsv2rgb(hsvColor);
                
                // 3. ADDITIONAL MOUSE INFLUENCE: create a 'heat' effect based on distance from center of mouse influence
                // Use UV coordinates to create a vignette-like shift? Instead, we mix with a secondary color based on absolute mouse position
                vec2 centeredUv = vUv * 2.0 - 1.0;
                float mouseDistance = length(vec2(mouseX, mouseY));
                // Warmer tone when mouse is far from center
                vec3 warmColor = vec3(1.0, 0.4, 0.8);
                vec3 coolColor = vec3(0.2, 0.6, 1.0);
                float mixFactor = (mouseDistance + pulseRaw * 0.3) * 0.8;
                vec3 mouseInfluenceColor = mix(coolColor, warmColor, mixFactor);
                
                // Blend the main color with mouse-influenced color for extra complexity
                color = mix(color, mouseInfluenceColor, 0.35);
                
                // 4. GLOW PULSE: intensify RGB channels based on pulse factor and mouse Y
                float extraGlow = (pulseRaw * 0.7 + 0.5) * (0.8 + abs(mouseY) * 0.6);
                color += vec3(0.5, 0.3, 0.7) * extraGlow * 0.5;
                
                // 5. ADD FRESNEL / EDGE GLOW for that "shader magic"
                float fresnel = pow(1.0 - abs(dot(normal, viewDir)), 2.0);
                vec3 fresnelColor = vec3(0.8, 0.4, 1.0) * fresnel * (0.8 + pulseFactor * 1.2);
                color += fresnelColor * 0.7;
                
                // Final tweak: ensure vibrant colors and clamp
                color = clamp(color, 0.0, 1.2);
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;

      // Geometry with high tessellation for smooth fresnel and lighting
      const geometry = new THREE.SphereGeometry(0.95, 256, 256);

      // Shader uniforms
      const uniforms = {
        uTime: { value: 0 },
        uMouse: mouseUniform,
        uGlowIntensity: { value: 0.8 },
      };

      const shaderMaterial = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        transparent: false,
        side: THREE.DoubleSide, // gives more visual depth for fresnel
        emissiveIntensity: 1.0, // not directly used but for bloom compatibility
        toneMapped: true,
      });

      const coreSphere = new THREE.Mesh(geometry, shaderMaterial);
      scene.add(coreSphere);

      // --- Additional elements to enhance the interactive shader experience:
      // Particle system that also reacts to mouse (just for flair)
      const particleCount = 2500;
      const particleGeo = new THREE.BufferGeometry();
      const particlePositions = new Float32Array(particleCount * 3);
      // Distribute particles in a spherical cloud around radius 1.2 to 2.2
      for (let i = 0; i < particleCount; i++) {
        const radius = 1.2 + Math.random() * 1.3;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        particlePositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        particlePositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        particlePositions[i * 3 + 2] = radius * Math.cos(phi);
      }
      particleGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(particlePositions, 3),
      );

      // Particle material that also changes color based on time + mouse influence (simple additive)
      const particleMat = new THREE.PointsMaterial({
        color: 0xaa88ff,
        size: 0.022,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.6,
      });
      const particles = new THREE.Points(particleGeo, particleMat);
      scene.add(particles);

      // Add a subtle outer wireframe sphere to emphasize the shader sphere
      const wireframeGeo = new THREE.SphereGeometry(1.02, 48, 48);
      const wireframeMat = new THREE.MeshBasicMaterial({
        color: 0x77aaff,
        wireframe: true,
        transparent: true,
        opacity: 0.2,
        blending: THREE.AdditiveBlending,
      });
      const wireframeSphere = new THREE.Mesh(wireframeGeo, wireframeMat);
      scene.add(wireframeSphere);

      // --- Lighting (even with shader, lights affect scene ambiance but not the shader material directly,
      // but we add ambient and some lights for background objects and particles)
      const ambientLight = new THREE.AmbientLight(0x111122);
      scene.add(ambientLight);
      const backLight = new THREE.PointLight(0x6644aa, 0.5);
      backLight.position.set(0, 2, -3);
      scene.add(backLight);
      const colorLight = new THREE.PointLight(0xff66cc, 0.6);
      colorLight.position.set(1.5, 1, 2);
      scene.add(colorLight);

      // Starfield background
      const starCount = 1500;
      const starFieldGeo = new THREE.BufferGeometry();
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        starPositions[i * 3] = (Math.random() - 0.5) * 200;
        starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 80 - 40;
      }
      starFieldGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(starPositions, 3),
      );
      const starMatObj = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.08,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
      });
      const stars = new THREE.Points(starFieldGeo, starMatObj);
      scene.add(stars);

      // --- Mouse smoothing and uniform update logic ---
      let clock = new THREE.Clock();

      // Additional uniform for dynamic particle color based on mouse
      function animate() {
        const delta = clock.getDelta();
        const elapsedTime = performance.now() / 1000;

        // Smooth mouse interpolation for elegant transitions (lerp)
        currentMouse.lerp(targetMouse, 0.08);
        // Update shader uniform
        mouseUniform.value = currentMouse;

        // Update shader time uniform
        uniforms.uTime.value = elapsedTime;

        // Also update particle colors/scale dynamically based on mouse position for extra reactivity
        const mouseInfluence =
          (Math.abs(currentMouse.x) + Math.abs(currentMouse.y)) / 2;
        const pulseTime = Math.sin(elapsedTime * 2.2) * 0.5 + 0.5;
        // Make particles pulse in size and color according to mouse distance
        const particleSizeBase = 0.018;
        const dynamicSize =
          particleSizeBase + mouseInfluence * 0.02 + pulseTime * 0.008;
        particleMat.size = Math.min(0.045, dynamicSize);

        // Change particle color hue using mouse X
        const hueParticle = (elapsedTime * 0.1 + currentMouse.x * 0.5) % 1.0;
        // Simple RGB conversion for points material (not shader, but we can use HSL -> but PointsMaterial color is fixed, so we use a dynamic color)
        // For performance, we'll cycle particle color between blue, magenta, cyan based on mouse
        const r = 0.5 + Math.sin(elapsedTime * 1.2 + currentMouse.x * 4) * 0.5;
        const g =
          0.4 + Math.sin(elapsedTime * 1.5 + currentMouse.y * 3 + 2) * 0.5;
        const b =
          0.8 + Math.sin(elapsedTime * 1.8 + currentMouse.x * 5 + 1) * 0.4;
        particleMat.color.setRGB(r, g, b);

        // Wireframe sphere rotation and slight pulse opacity
        wireframeSphere.rotation.y = elapsedTime * 0.15;
        wireframeSphere.rotation.x = Math.sin(elapsedTime * 0.25) * 0.2;
        const wireOpacity =
          0.2 + Math.sin(elapsedTime * 2.0) * 0.1 + mouseInfluence * 0.15;
        wireframeMat.opacity = Math.min(0.5, wireOpacity);

        // Rotate particle field based on mouse for extra dynamics
        particles.rotation.y = elapsedTime * 0.05 + currentMouse.x * 0.5;
        particles.rotation.x =
          Math.sin(elapsedTime * 0.2) * 0.1 + currentMouse.y * 0.3;

        // Stars slowly drift
        stars.rotation.y += 0.0008;
        stars.rotation.x += 0.0004;

        // Dynamically adjust bloom strength slightly based on mouse position and pulse
        const pulseBloom = 0.7 + Math.sin(elapsedTime * 2.0) * 0.3;
        const mouseBloomBoost =
          (Math.abs(currentMouse.x) + Math.abs(currentMouse.y)) * 0.4;
        bloomPass.strength = Math.min(
          1.4,
          0.85 + pulseBloom * 0.3 + mouseBloomBoost,
        );

        // Move lights subtly in response to mouse (makes scene feel alive)
        colorLight.position.x = 1.2 + currentMouse.x * 0.8;
        colorLight.position.y = 0.8 + currentMouse.y * 0.9;
        colorLight.intensity = 0.6 + mouseInfluence * 0.5;

        backLight.intensity = 0.4 + Math.sin(elapsedTime) * 0.2;

        // Update controls
        controls.update();

        // Render via EffectComposer for bloom
        effectComposer.render();

        requestAnimationFrame(animate);
      }

      animate();

      // --- Resize handler ---
      window.addEventListener("resize", onWindowResize, false);
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        effectComposer.setSize(window.innerWidth, window.innerHeight);
      }

      // Small console log to indicate ready
      console.log(
        "Interactive Shader Pulse Active | Mouse-reactive colors via GLSL",
      );

      // Optional: add a small indicator that mouse position influences color (already in UI)
      // Create a floating hover effect for fun: display coordinates in console? not needed.

      // Additional touch support for mobile: use touchmove to send mouse coordinates
      window.addEventListener("touchmove", (event) => {
        if (event.touches.length) {
          const touch = event.touches[0];
          const nx = (touch.clientX / window.innerWidth) * 2 - 1;
          const ny = (touch.clientY / window.innerHeight) * 2 - 1;
          targetMouse.set(nx, ny);
        }
      });

      window.addEventListener("touchend", () => {
        // slowly reset mouse to center? but fine
        targetMouse.lerp(new THREE.Vector2(0, 0), 0.5);
      });
    </script>
  </body>
</html>
